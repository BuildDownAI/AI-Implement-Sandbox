# Synced to target repos. /ai-implement on a PR → gap-fill run.
# All pipeline logic lives in the runner image (ghcr.io/builddownai/ai-implement-runner).
# Do not edit in target repos.
#
# Required secrets:
#   AI_IMPLEMENT_APP_ID, AI_IMPLEMENT_PRIVATE_KEY
#   ANTHROPIC_API_KEY, CLAUDE_CODE_OAUTH_TOKEN
#
# Optional repository variables (Bedrock-enabled repos only):
#   AI_IMPLEMENT_PROVIDER    - Set to "bedrock" to route through AWS Bedrock.
#   AI_IMPLEMENT_AWS_REGION  - AWS region (required when provider=bedrock).
#
# Optional repository variables (per-project run caps — mirror the orchestrator
# admin UI mapping so /ai-implement comment runs get the same caps):
#   AI_IMPLEMENT_MAX_TURNS       - Cap on Claude turns per implement pass (default 50).
#   AI_IMPLEMENT_MAX_ITERATIONS  - Cap on implement/review iterations (default: bedrock 2 / anthropic 3).
#   AI_IMPLEMENT_MAX_JOB_MINUTES - Per-project job timeout in minutes (default 90).
#
# Optional repository or organization variables:
#   AI_IMPLEMENT_RUNNER_IMAGE                    - Default runner image for this repo/org.
#   AI_IMPLEMENT_ALLOWED_RUNNER_IMAGE_PREFIXES   - Extra image prefixes allowed in addition to ghcr.io/builddownai/ and the repo owner's own ghcr.io/<owner>/ namespace (auto-trusted).
# The default runner image uses the public ghcr.io/builddownai/ai-implement-runner:latest tag.

name: AI Implementation Comment Trigger

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check-trigger:
    if: github.event.issue.pull_request
    runs-on: ubuntu-latest
    outputs:
      matched: ${{ steps.trigger.outputs.matched }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
      issue_meta: ${{ steps.pr.outputs.issue_meta }}
      default_branch: ${{ steps.pr.outputs.default_branch }}
      provider: ${{ steps.pr.outputs.provider }}
      aws_region: ${{ steps.pr.outputs.aws_region }}
      max_turns: ${{ steps.pr.outputs.max_turns }}
      max_iterations: ${{ steps.pr.outputs.max_iterations }}
      max_job_minutes: ${{ steps.pr.outputs.max_job_minutes }}
      runner_image: ${{ steps.runner-image.outputs.runner_image }}
    steps:
      - name: Check trigger command
        id: trigger
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const body = context.payload.comment.body ?? "";
            const matched = body.trim() === "/ai-implement";
            core.setOutput("matched", matched ? "true" : "false");
            if (!matched) {
              core.info("Ignoring comment because it is not exactly /ai-implement");
            }

      - name: Auth check (write, maintain, or admin)
        if: steps.trigger.outputs.matched == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner, repo: context.repo.repo, username: context.actor,
            });
            if (!["write", "maintain", "admin"].includes(perm.permission)) {
              core.setFailed(`Actor ${context.actor} lacks write, maintain, or admin permission`);
            }

      - name: Acknowledge trigger
        if: steps.trigger.outputs.matched == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: "+1",
            });

      - name: Extract PR metadata
        if: steps.trigger.outputs.matched == 'true'
        id: pr
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          AI_IMPLEMENT_PROVIDER: ${{ vars.AI_IMPLEMENT_PROVIDER }}
          AI_IMPLEMENT_AWS_REGION: ${{ vars.AI_IMPLEMENT_AWS_REGION }}
          AI_IMPLEMENT_MAX_TURNS: ${{ vars.AI_IMPLEMENT_MAX_TURNS }}
          AI_IMPLEMENT_MAX_ITERATIONS: ${{ vars.AI_IMPLEMENT_MAX_ITERATIONS }}
          AI_IMPLEMENT_MAX_JOB_MINUTES: ${{ vars.AI_IMPLEMENT_MAX_JOB_MINUTES }}
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: context.payload.issue.number,
            });
            const m = pr.data.body?.match(/<!--\s*ai-implement-meta([\s\S]*?)-->/);
            if (!m) {
              core.setFailed("PR body has no ai-implement-meta block");
              return;
            }
            const meta = Object.fromEntries(
              m[1].split("\n").map((l) => l.match(/^\s*([a-z_]+):\s*(.+?)\s*$/))
                  .filter(Boolean).map((mm) => [mm[1], mm[2]])
            );
            core.setOutput("pr_number", String(context.payload.issue.number));
            core.setOutput("issue_meta", JSON.stringify(meta));
            // The workflow runs in the target repo, so repository.default_branch is the target fallback.
            core.setOutput("default_branch", pr.data.base.ref || context.payload.repository.default_branch || "");
            core.setOutput("provider", process.env.AI_IMPLEMENT_PROVIDER || "anthropic");
            core.setOutput("aws_region", process.env.AI_IMPLEMENT_AWS_REGION || "");
            core.setOutput("max_turns", process.env.AI_IMPLEMENT_MAX_TURNS || "");
            core.setOutput("max_iterations", process.env.AI_IMPLEMENT_MAX_ITERATIONS || "");
            core.setOutput("max_job_minutes", process.env.AI_IMPLEMENT_MAX_JOB_MINUTES || "");

      - name: Resolve and validate runner image
        if: steps.trigger.outputs.matched == 'true'
        id: runner-image
        env:
          CONFIGURED_RUNNER_IMAGE: ${{ vars.AI_IMPLEMENT_RUNNER_IMAGE }}
          EXTRA_ALLOWED_PREFIXES: ${{ vars.AI_IMPLEMENT_ALLOWED_RUNNER_IMAGE_PREFIXES }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          if [ -z "$owner" ]; then
            echo "::error::GITHUB_REPOSITORY_OWNER is empty; cannot derive the owner image prefix." >&2
            exit 1
          fi

          # Resolution ladder: .ai-implement/image.yml > repo/org var > upstream default.
          # Read the override from the DEFAULT branch only — never the PR head — so a
          # comment-triggered gap-fill run cannot be pointed at an attacker-chosen image
          # via a PR edit. `gh api` with no ?ref= resolves the default branch.
          runner_image=""
          if raw="$(gh api "repos/${GITHUB_REPOSITORY}/contents/.ai-implement/image.yml" \
                -H "Accept: application/vnd.github.raw+json" 2>/dev/null)"; then
            runner_image="$(printf '%s\n' "$raw" | sed -n 's/^image:[[:space:]]*\([^[:space:]][^[:space:]]*\)[[:space:]]*$/\1/p' | head -n1)" || true
          fi

          if [ -z "$runner_image" ]; then
            runner_image="${CONFIGURED_RUNNER_IMAGE:-}"
          fi
          if [ -z "$runner_image" ]; then
            runner_image="ghcr.io/builddownai/ai-implement-runner:latest"
          fi

          case "$runner_image" in
            *[!A-Za-z0-9._:/@-]*)
              echo "::error::runner_image \"$runner_image\" contains invalid characters for a container image reference." >&2
              exit 1
              ;;
          esac

          allowed_prefixes="ghcr.io/builddownai/,ghcr.io/${owner}/"
          if [ -n "${EXTRA_ALLOWED_PREFIXES:-}" ]; then
            allowed_prefixes="${allowed_prefixes},${EXTRA_ALLOWED_PREFIXES}"
          fi

          allowed=false
          IFS=',' read -ra prefixes <<< "$allowed_prefixes"
          for raw_prefix in "${prefixes[@]}"; do
            prefix="$(echo "$raw_prefix" | xargs)"
            [ -z "$prefix" ] && continue
            # Literal prefix match — quote "$prefix" so glob metacharacters in an
            # operator-supplied AI_IMPLEMENT_ALLOWED_RUNNER_IMAGE_PREFIXES can't widen it.
            if [[ "$runner_image" == "$prefix"* ]]; then
              allowed=true
              break
            fi
          done

          if [ "$allowed" != "true" ]; then
            echo "::error::runner_image \"$runner_image\" is not allowed." >&2
            echo "::error::Allowed prefixes:" >&2
            for raw_prefix in "${prefixes[@]}"; do
              prefix="$(echo "$raw_prefix" | xargs)"
              [ -z "$prefix" ] && continue
              echo "::error::- $prefix" >&2
            done
            echo "::error::To allow this image, set the repository or organization variable AI_IMPLEMENT_ALLOWED_RUNNER_IMAGE_PREFIXES=<prefix>." >&2
            echo "::error::Example: AI_IMPLEMENT_ALLOWED_RUNNER_IMAGE_PREFIXES=ghcr.io/acme/" >&2
            echo "::error::Use comma-separated prefixes for multiple registries or namespaces." >&2
            exit 1
          fi

          echo "runner_image=$runner_image" >> "$GITHUB_OUTPUT"

  implement:
    needs: check-trigger
    if: needs.check-trigger.outputs.matched == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ needs.check-trigger.outputs.max_job_minutes && fromJSON(needs.check-trigger.outputs.max_job_minutes) || 90 }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    container:
      image: ${{ needs.check-trigger.outputs.runner_image }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349
        with:
          app-id: ${{ secrets.AI_IMPLEMENT_APP_ID }}
          private-key: ${{ secrets.AI_IMPLEMENT_PRIVATE_KEY }}

      - name: Validate Bedrock inputs
        if: needs.check-trigger.outputs.provider == 'bedrock'
        env:
          AWS_REGION: ${{ needs.check-trigger.outputs.aws_region }}
          ROLE_ARN: ${{ secrets.AWS_BEDROCK_ROLE_ARN }}
        run: |
          if [ -z "$AWS_REGION" ]; then
            echo "::error::AI_IMPLEMENT_PROVIDER=bedrock but AI_IMPLEMENT_AWS_REGION repository or organization variable is empty."
            echo "::error::Set AI_IMPLEMENT_AWS_REGION to the Bedrock region used by this repo."
            exit 1
          fi
          if [ -z "$ROLE_ARN" ]; then
            echo "::error::AI_IMPLEMENT_PROVIDER=bedrock but AWS_BEDROCK_ROLE_ARN repo secret is not set."
            echo "::error::Add the IAM role ARN trusted to GitHub OIDC with bedrock:InvokeModel permission."
            exit 1
          fi

      - name: Configure AWS credentials (Bedrock)
        if: needs.check-trigger.outputs.provider == 'bedrock'
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c
        with:
          role-to-assume: ${{ secrets.AWS_BEDROCK_ROLE_ARN }}
          aws-region: ${{ needs.check-trigger.outputs.aws_region }}
          role-session-duration: 14400

      - name: Run pipeline (gap-fill)
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_DEFAULT_BRANCH: ${{ needs.check-trigger.outputs.default_branch }}
          PR_NUMBER: ${{ needs.check-trigger.outputs.pr_number }}
          RUNNER_PHASE: gap-analysis
          ISSUE_META: ${{ needs.check-trigger.outputs.issue_meta }}
          PROVIDER: ${{ needs.check-trigger.outputs.provider }}
          AI_IMPLEMENT_MAX_TURNS: ${{ needs.check-trigger.outputs.max_turns }}
          AI_IMPLEMENT_MAX_ITERATIONS: ${{ needs.check-trigger.outputs.max_iterations }}
          AI_IMPLEMENT_LOG_LEVEL: ${{ vars.AI_IMPLEMENT_LOG_LEVEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          # ISSUE_META is parsed from the PR body. The JavaScript parser only emits
          # lower_snake_case keys, jq allows only expected metadata keys here, and
          # jq @sh quotes values before this eval.
          eval "$(echo "$ISSUE_META" | jq -r 'to_entries[] | select(.key | IN("issue_id", "issue_identifier", "issue_title", "issue_description_b64")) | "export \(.key | ascii_upcase)=\(.value | @sh)"')"
          export ISSUE_DESCRIPTION=$(echo "$ISSUE_DESCRIPTION_B64" | base64 -d)
          /opt/ai-implement/entrypoint.sh
