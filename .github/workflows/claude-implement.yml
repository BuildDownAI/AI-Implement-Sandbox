# Synced to target repos by sync-workflow.yml.
# All pipeline logic lives in the runner image (ghcr.io/builddownai/ai-implement-runner).
# Do not edit in target repos.
#
# Required secrets:
#   AI_IMPLEMENT_APP_ID      - GitHub App numeric ID
#   AI_IMPLEMENT_PRIVATE_KEY - GitHub App PEM private key
#   ANTHROPIC_API_KEY        - Anthropic API key
#   CLAUDE_CODE_OAUTH_TOKEN  - Claude Code OAuth token (preferred over API key)
#
# Additional secret (Bedrock provider):
#   AWS_BEDROCK_ROLE_ARN     - IAM role ARN trusted to GitHub OIDC; needs bedrock:InvokeModel
#
# Required repo setting:
#   Settings → Actions → General → "Allow GitHub Actions to create and approve pull requests" → ENABLED
#
# Optional repository or organization variables:
#   AI_IMPLEMENT_RUNNER_IMAGE                    - Default runner image for this repo/org.
#   AI_IMPLEMENT_ALLOWED_RUNNER_IMAGE_PREFIXES   - Extra image prefixes allowed in addition to ghcr.io/builddownai/ and the repo owner's own ghcr.io/<owner>/ namespace (auto-trusted).
#   AI_IMPLEMENT_RUNNER_LABEL                    - runs-on label for the implement job (default ubuntu-latest); set to a larger-runner label to speed up CPU-bound test suites.
#  a new line was added that will be overwritten upon syncing again
name: Claude AI Implementation

on:
  workflow_dispatch:
    inputs:
      issue_id:
        description: "Ticketing-system issue ID"
        required: true
        type: string
      issue_identifier:
        description: "Ticketing-system issue identifier (e.g., ENG-123)"
        required: true
        type: string
      issue_title:
        description: "Ticketing-system issue title"
        required: true
        type: string
      issue_description:
        description: "Ticketing-system issue description"
        required: true
        type: string
      pr_number:
        description: "Existing PR number for gap-fill runs (leave empty for new implementation)"
        required: false
        type: string
        default: ""
      base_branch:
        description: "Branch the runner clones and the PR targets (feature-branch grouping). Empty = repo default."
        required: false
        type: string
        default: ""
      runner_phase:
        description: "Runner callback phase: implementation or gap-analysis (empty keeps legacy PR_NUMBER inference)"
        required: false
        type: string
        default: ""
      provider:
        description: "Claude provider: 'anthropic' (default) or 'bedrock'"
        required: false
        type: string
        default: "anthropic"
      aws_region:
        description: "AWS region for Bedrock (required when provider=bedrock)"
        required: false
        type: string
        default: ""
      max_turns:
        description: "Cap on Claude turnss per implement pass (empty = runner default)"
        required: false
        type: string
        default: ""
      max_iterations:
        description: "Cap on implement/review iterations (empty = provider default)"
        required: false
        type: string
        default: ""
      job_timeout_minutes:
        description: "Per-project job timeout in minutes, must be a positive integer (empty = 90)"
        required: false
        type: string
        default: ""
      branch_prefix:
        description: "Optional branch-name prefix prepended as a path segment (empty = no prefix)"
        required: false
        type: string
        default: ""
      runner_callback_url:
        description: "Base URL the orchestrator advertises for /runner/result; empty skips callback"
        required: false
        type: string
        default: ""
      run_token:
        description: "HMAC bearer token authorizing the result POST; empty skips callback"
        required: false
        type: string
        default: ""
      run_progress_token:
        description: "HMAC bearer token authorizing progress POSTs; empty skips progress callback"
        required: false
        type: string
        default: ""
      runner_image:
        description: "Override the runner image for this run (must match ghcr.io/builddownai/*, the repo owner's ghcr.io/<owner>/*, or AI_IMPLEMENT_ALLOWED_RUNNER_IMAGE_PREFIXES)"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  validate-runner-image:
    runs-on: ubuntu-latest
    outputs:
      runner_image: ${{ steps.resolve.outputs.runner_image }}
    steps:
      - name: Resolve and validate runner image
        id: resolve
        env:
          REQUESTED_RUNNER_IMAGE: ${{ inputs.runner_image }}
          CONFIGURED_RUNNER_IMAGE: ${{ vars.AI_IMPLEMENT_RUNNER_IMAGE }}
          EXTRA_ALLOWED_PREFIXES: ${{ vars.AI_IMPLEMENT_ALLOWED_RUNNER_IMAGE_PREFIXES }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          if [ -z "$owner" ]; then
            echo "::error::GITHUB_REPOSITORY_OWNER is empty; cannot derive the owner image prefix." >&2
            exit 1
          fi

          # Resolution ladder: dispatch input > .ai-implement/image.yml > repo/org var > upstream default.
          runner_image="${REQUESTED_RUNNER_IMAGE:-}"

          # Read the per-repo override from the DEFAULT branch only — never a PR head — so a
          # pull request cannot choose the image its privileged run executes in. `gh api` with
          # no ?ref= resolves the default branch; mirrors src/repo-image.ts parsing.
          if [ -z "$runner_image" ]; then
            if raw="$(gh api "repos/${GITHUB_REPOSITORY}/contents/.ai-implement/image.yml" \
                  -H "Accept: application/vnd.github.raw+json" 2>/dev/null)"; then
              runner_image="$(printf '%s\n' "$raw" | sed -n 's/^image:[[:space:]]*\([^[:space:]][^[:space:]]*\)[[:space:]]*$/\1/p' | head -n1)" || true
            fi
          fi

          if [ -z "$runner_image" ]; then
            runner_image="${CONFIGURED_RUNNER_IMAGE:-}"
          fi
          if [ -z "$runner_image" ]; then
            runner_image="ghcr.io/builddownai/ai-implement-runner:latest"
          fi

          case "$runner_image" in
            *[!A-Za-z0-9._:/@-]*)
              echo "::error::runner_image \"$runner_image\" contains invalid characters for a container image reference." >&2
              exit 1
              ;;
          esac

          allowed_prefixes="ghcr.io/builddownai/,ghcr.io/${owner}/"
          if [ -n "${EXTRA_ALLOWED_PREFIXES:-}" ]; then
            allowed_prefixes="${allowed_prefixes},${EXTRA_ALLOWED_PREFIXES}"
          fi

          allowed=false
          IFS=',' read -ra prefixes <<< "$allowed_prefixes"
          for raw_prefix in "${prefixes[@]}"; do
            prefix="$(echo "$raw_prefix" | xargs)"
            [ -z "$prefix" ] && continue
            # Literal prefix match — quote "$prefix" so glob metacharacters in an
            # operator-supplied AI_IMPLEMENT_ALLOWED_RUNNER_IMAGE_PREFIXES can't widen it.
            if [[ "$runner_image" == "$prefix"* ]]; then
              allowed=true
              break
            fi
          done

          if [ "$allowed" != "true" ]; then
            echo "::error::runner_image \"$runner_image\" is not allowed." >&2
            echo "::error::Allowed prefixes:" >&2
            for raw_prefix in "${prefixes[@]}"; do
              prefix="$(echo "$raw_prefix" | xargs)"
              [ -z "$prefix" ] && continue
              echo "::error::- $prefix" >&2
            done
            echo "::error::To allow this image, set the repository or organization variable AI_IMPLEMENT_ALLOWED_RUNNER_IMAGE_PREFIXES=<prefix>." >&2
            echo "::error::Example: AI_IMPLEMENT_ALLOWED_RUNNER_IMAGE_PREFIXES=ghcr.io/acme/" >&2
            echo "::error::Use comma-separated prefixes for multiple registries or namespaces." >&2
            exit 1
          fi

          echo "runner_image=$runner_image" >> "$GITHUB_OUTPUT"

  implement:
    needs: validate-runner-image
    # Default GitHub-hosted runners are 2 vCPU; the test suites Claude runs are
    # CPU-bound and scale ~linearly with cores. Set AI_IMPLEMENT_RUNNER_LABEL to
    # a larger-runner label (e.g. ubuntu-latest-4-cores) to speed those up.
    runs-on: ${{ vars.AI_IMPLEMENT_RUNNER_LABEL || 'ubuntu-latest' }}
    timeout-minutes: ${{ inputs.job_timeout_minutes && fromJSON(inputs.job_timeout_minutes) || 90 }}
    container:
      image: ${{ needs.validate-runner-image.outputs.runner_image }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349
        with:
          app-id: ${{ secrets.AI_IMPLEMENT_APP_ID }}
          private-key: ${{ secrets.AI_IMPLEMENT_PRIVATE_KEY }}

      - name: Validate Bedrock inputs
        if: inputs.provider == 'bedrock'
        env:
          AWS_REGION: ${{ inputs.aws_region }}
          ROLE_ARN: ${{ secrets.AWS_BEDROCK_ROLE_ARN }}
        run: |
          if [ -z "$AWS_REGION" ]; then
            echo "::error::provider=bedrock but aws_region dispatch input is empty."
            echo "::error::Set awsRegion on this team's mapping in the orchestrator admin UI."
            exit 1
          fi
          if [ -z "$ROLE_ARN" ]; then
            echo "::error::provider=bedrock but AWS_BEDROCK_ROLE_ARN repo secret is not set."
            echo "::error::Add the IAM role ARN trusted to GitHub OIDC with bedrock:InvokeModel permission."
            exit 1
          fi

      - name: Configure AWS credentials (Bedrock)
        if: inputs.provider == 'bedrock'
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c
        with:
          role-to-assume: ${{ secrets.AWS_BEDROCK_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}
          role-session-duration: 14400

      - name: Mask runner callback tokens
        run: |
          if [ -n "${{ inputs.run_token }}" ]; then
            echo "::add-mask::${{ inputs.run_token }}"
          fi
          if [ -n "${{ inputs.run_progress_token }}" ]; then
            echo "::add-mask::${{ inputs.run_progress_token }}"
          fi

      - name: Run pipeline
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_ID: ${{ inputs.issue_id }}
          ISSUE_IDENTIFIER: ${{ inputs.issue_identifier }}
          ISSUE_TITLE: ${{ inputs.issue_title }}
          ISSUE_DESCRIPTION: ${{ inputs.issue_description }}
          PR_NUMBER: ${{ inputs.pr_number }}
          GITHUB_DEFAULT_BRANCH: ${{ inputs.base_branch || github.ref_name }}
          RUNNER_PHASE: ${{ inputs.runner_phase }}
          PROVIDER: ${{ inputs.provider }}
          AWS_REGION: ${{ inputs.aws_region }}
          AI_IMPLEMENT_MAX_TURNS: ${{ inputs.max_turns }}
          AI_IMPLEMENT_MAX_ITERATIONS: ${{ inputs.max_iterations }}
          AI_IMPLEMENT_BRANCH_PREFIX: ${{ inputs.branch_prefix }}
          AI_IMPLEMENT_LOG_LEVEL: ${{ vars.AI_IMPLEMENT_LOG_LEVEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          RUNNER_CALLBACK_URL: ${{ inputs.runner_callback_url }}
          RUN_TOKEN: ${{ inputs.run_token }}
          RUN_PROGRESS_TOKEN: ${{ inputs.run_progress_token }}
        run: /opt/ai-implement/entrypoint.sh
